<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Vælg adgangskode — Substans</title>
  <link rel="stylesheet" href="app.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="index.html">Substans</a>
    <span class="eyebrow">Campus</span>
    <h1 class="title">Vælg din adgangskode.</h1>
    <p class="muted">Adgangskoden skal bestå af mindst otte tegn.</p>
    <form id="passwordForm">
      <div class="field"><label for="password">Ny adgangskode</label><input id="password" type="password" minlength="8" autocomplete="new-password" required></div>
      <div class="field"><label for="confirmPassword">Gentag adgangskoden</label><input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required></div>
      <button id="saveButton" class="button" type="submit">Gem adgangskode</button>
      <div id="status" class="status" role="status"></div>
    </form>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const form=document.getElementById("passwordForm"),password=document.getElementById("password"),confirmPassword=document.getElementById("confirmPassword"),statusBox=document.getElementById("status"),saveButton=document.getElementById("saveButton");
    function show(message,type){statusBox.textContent=message;statusBox.className="status show "+type}
    async function ensureRecoverySession(){const{data:{session}}=await supabaseClient.auth.getSession();if(!session){show("Linket er udløbet eller allerede brugt. Bed om et nyt link.","error");saveButton.disabled=true}}
    form.addEventListener("submit",async event=>{event.preventDefault();if(password.value!==confirmPassword.value){show("Adgangskoderne er ikke ens.","error");return}saveButton.disabled=true;saveButton.textContent="Gemmer…";const{error}=await supabaseClient.auth.updateUser({password:password.value});if(error){show("Adgangskoden kunne ikke gemmes. Prøv et nyt link.","error");saveButton.disabled=false;saveButton.textContent="Gem adgangskode";return}show("Din adgangskode er gemt. Du sendes videre…","success");window.setTimeout(()=>window.location.replace("admin.html"),900)});
    ensureRecoverySession();
  </script>
</body>
</html>
