<!doctype html>
<html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mit læringsrum — Substans</title><link rel="stylesheet" href="app.css"></head>
<body><div id="loading" class="loading">Henter dit læringsrum…</div>
<div id="app" class="shell" hidden>
  <aside class="sidebar"><a class="brand" href="index.html">Substans</a><nav id="roleNav" class="nav"></nav><div class="sidebar-footer"><button class="button secondary" onclick="signOut()">Log ud</button></div></aside>
  <main class="main"><header class="topbar"><div><span id="roleLabel" class="eyebrow">Elev</span><h1 class="title">Assalamu alaikum, <span id="firstName">elev</span>.</h1><p class="muted">Her er dit overblik for denne uge.</p></div><span class="badge">Substans Campus</span></header><section id="roleContent" class="grid"></section></main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="auth.js"></script>
<script>
const views={
student:{label:"Elev",nav:["Overblik","Mine lektioner","Materialer","Fremskridt"],html:`<article class="card stat"><span class="muted">Ugens fremmøde</span><strong>100%</strong><div class="progress"><span style="width:100%"></span></div></article><article class="card stat"><span class="muted">Ugens fokus</span><strong style="font-size:22px">Ar-Raḥmān</strong><small class="muted">Qur’an og forståelse</small></article><article class="card stat"><span class="muted">Åbne opgaver</span><strong>1</strong><small class="muted">Færdiggør inden søndag</small></article><article class="card wide"><span class="eyebrow">Næste lektion</span><div class="lesson"><div class="date-box"><small>Søn</small>10:00</div><div><h2>Sīrah · De første åbenbaringer</h2><p class="muted">Hav notesbog og Qur’an klar.</p></div><button class="button">Åbn lektion</button></div></article><article class="card"><span class="eyebrow">Underviserens feedback</span><p class="quote">“Du forklarede betydningen med dine egne ord. Fortsæt sådan.”</p><span class="muted">Ustadh · i går</span></article>`},
parent:{label:"Forælder",nav:["Mit barn","Kalender","Feedback","Beskeder"],html:`<article class="card stat"><span class="muted">Fremmøde</span><strong>92%</strong><div class="progress"><span style="width:92%"></span></div></article><article class="card stat"><span class="muted">Gennemførte lektioner</span><strong>11</strong><small class="muted">Ud af 12 lektioner</small></article><article class="card stat"><span class="muted">Næste undervisning</span><strong style="font-size:22px">Søndag 10.00</strong><small class="muted">Sīrah</small></article><article class="card wide"><span class="eyebrow">Seneste undervisning</span><h2>Surah Al-Fātiḥah</h2><p>Vi talte om betydningen af Ar-Raḥmān. Yusuf deltog aktivt og gav egne eksempler.</p><div class="row"><b>Spørg derhjemme</b><span>Hvordan mærker vi Allahs barmhjertighed?</span></div></article><article class="card"><span class="eyebrow">Udvikling</span><h2>God kontinuitet</h2><p class="muted">Yusuf møder forberedt og viser stigende sikkerhed i samtalerne.</p></article>`},
teacher:{label:"Underviser",nav:["Dagens overblik","Mit hold","Fremmøde","Feedback","Materialer"],html:`<article class="card stat"><span class="muted">Elever på holdet</span><strong>10</strong><small class="muted">Hold 1 · 8–10 år</small></article><article class="card stat"><span class="muted">Feedback mangler</span><strong>3</strong><small class="muted">Fra seneste lektion</small></article><article class="card stat"><span class="muted">Næste lektion</span><strong style="font-size:22px">Søndag 10.00</strong><small class="muted">Starter om 3 dage</small></article><article class="card wide"><span class="eyebrow">Kommende lektion</span><h2>Sīrah · De første åbenbaringer</h2><div class="list"><div class="row"><span>Lektionsplan</span><span class="badge">Klar</span></div><div class="row"><span>Materialer</span><span class="badge">3 filer</span></div><div class="row"><span>Forældrebesked</span><span class="muted">Kladde</span></div></div></article><article class="card"><span class="eyebrow">Hurtige handlinger</span><div class="list"><button class="button">Registrér fremmøde</button><button class="button secondary">Skriv feedback</button><button class="button secondary">Upload materiale</button></div></article>`}
};
function renderRole(role,name){const v=views[role]||views.student;roleLabel.textContent=v.label;firstName.textContent=name.split(" ")[0];roleNav.innerHTML=v.nav.map((x,i)=>`<a class="${i===0?"active":""}" href="#">${x}</a>`).join("");roleContent.innerHTML=v.html}
(async()=>{const auth=await requireRole(["student","parent","teacher"]);if(!auth)return;const name=auth.profile.full_name||auth.session.user.email.split("@")[0];renderRole(auth.profile.role,name);loading.remove();app.hidden=false})();
</script></body></html>
